name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint code
      run: npm run lint

    - name: Build project
      run: npm run build

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    # Add your deployment steps here:
    # - For Vercel: https://vercel.com/docs/concepts/deployments/git/deploy-github-actions
    # - For Netlify: https://www.netlify.com/blog/2020/04/09/continuous-deployment-with-github-actions/
    # - For Cloudflare Pages: https://developers.cloudflare.com/pages/how-to/use-direct-upload-with-github-actions/
    # - For your own server: Use scp, rsync, or any deployment tool you prefer
