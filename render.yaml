services:
  - type: web
    name: repopulse
    env: node
    plan: starter
    buildCommand: npm install && export PUPPETEER_CACHE_DIR=/opt/render/project/src/.cache/puppeteer && CHROME_PATH=$(npx puppeteer browsers install chrome --path=$PUPPETEER_CACHE_DIR --format='{{path}}') && mkdir -p $PUPPETEER_CACHE_DIR && printf '%s' \"$CHROME_PATH\" > $PUPPETEER_CACHE_DIR/chrome-path.txt && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer
      - key: VITE_GITHUB_TOKEN
        sync: false
