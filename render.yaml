services:
  - type: web
    name: repopulse
    env: node
    plan: starter
    buildCommand: npm install && npx puppeteer browsers install chrome --path=/opt/render/project/src/.cache/puppeteer && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: VITE_GITHUB_TOKEN
        sync: false
